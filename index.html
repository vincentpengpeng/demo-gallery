<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旌越科技 · 产品能力展示</title>
<meta name="description" content="旌越科技 — 一站式预览旌越科技 AI 产品能力，涵盖教育、文旅及基础能力场景。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: "Noto Sans SC", "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Helvetica Neue", sans-serif;
    color: #1a1a2e;
    background: #f6f7fb;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }

  /* ========== Navigation ========== */
  .top-nav {
    position: fixed; top: 0; left: 0; right: 0; height: 56px;
    background: rgba(10,10,30,0.95);
    backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; z-index: 100;
  }
  .top-nav .brand { display: flex; align-items: center; gap: 12px; }
  .top-nav .brand img { height: 24px; width: auto; filter: brightness(0) invert(1); }
  .top-nav .brand-divider { width: 1px; height: 18px; background: rgba(255,255,255,0.12); }
  .top-nav .brand-text { font-family: "Outfit", sans-serif; font-size: 0.8rem; font-weight: 500; color: rgba(255,255,255,0.7); letter-spacing: 0.02em; }
  .top-nav .badge {
    font-family: "Outfit", sans-serif; font-size: 0.6rem; padding: 0.25rem 0.7rem;
    border-radius: 100px; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.45);
    font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
  }
  body { padding-top: 56px; }

  /* ========== Compact Hero ========== */
  .hero {
    background: #0a0a1e; color: #fff; padding: 2.5rem 2rem 2rem;
    position: relative; overflow: hidden;
  }
  .hero::after {
    content: ''; position: absolute;
    top: -40%; right: -5%; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(79,70,229,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }
  .hero-top { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1rem; }
  .hero-title-group { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
  .hero h1 {
    font-family: "Outfit", sans-serif; font-size: 2.2rem; font-weight: 700;
    letter-spacing: -0.03em; line-height: 1.15;
    background: linear-gradient(135deg, #fff 50%, #818cf8 90%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero-stats { display: flex; gap: 1.5rem; flex-shrink: 0; margin-left: auto; padding-top: 2px; }
  .hero-stat { text-align: center; }
  .hero-stat-num { font-family: "Outfit", sans-serif; font-size: 1.4rem; font-weight: 700; color: #fff; line-height: 1; }
  .hero-stat-label { font-size: 0.65rem; color: rgba(255,255,255,0.35); margin-top: 0.15rem; }
  .hero-stat-divider { width: 1px; background: rgba(255,255,255,0.08); }
  .hero-intro {
    display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
    padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.06);
  }
  .hero-intro .tagline {
    font-size: 0.75rem; color: #818cf8; font-weight: 600; letter-spacing: 0.02em;
    white-space: nowrap; padding: 0.2rem 0.7rem; border-radius: 100px;
    background: rgba(129,140,248,0.1); border: 1px solid rgba(129,140,248,0.15);
  }
  .hero-intro .mission { font-size: 0.75rem; color: rgba(255,255,255,0.5); line-height: 1.5; }
  .hero-intro .vision { font-size: 0.72rem; color: rgba(255,255,255,0.35); }

  @media (max-width: 768px) {
    .hero { padding: 1.5rem 1rem 1.2rem; }
    .hero-top { flex-direction: column; align-items: flex-start; }
    .hero-title-group { flex-direction: column; align-items: flex-start; }
    .hero-stats { width: 100%; justify-content: flex-start; gap: 1.2rem; }
    .hero h1 { font-size: 1.5rem; }
    .hero-stat-num { font-size: 1.1rem; }
    .hero-intro { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
  }

  /* ========== Company Intro Bar ========== */
  .intro-bar {
    background: #fff; border-bottom: 1px solid #eaebf2;
    padding: 1rem 2rem;
  }
  .intro-bar-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  .intro-bar .tagline {
    font-size: 0.8rem; color: #4f46e5; font-weight: 600; letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .intro-bar .mission {
    font-size: 0.8rem; color: #5a5d72; line-height: 1.6; flex: 1; text-align: center;
  }
  .intro-bar .vision {
    font-size: 0.78rem; color: #8b8fa3; line-height: 1.5; max-width: 320px; text-align: right;
  }
  @media (max-width: 768px) {
    .intro-bar { padding: 0.8rem 1rem; }
    .intro-bar-inner { flex-direction: column; align-items: flex-start; }
    .intro-bar .mission { text-align: left; }
    .intro-bar .vision { text-align: left; max-width: none; }
  }

  /* ========== Content ========== */
  .content { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 0; }

  /* ========== Filter Tabs ========== */
  .filter-bar {
    display: flex; justify-content: center; gap: 0.4rem; flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .filter-btn {
    padding: 0.4rem 1rem; border-radius: 100px; border: 1.5px solid #e2e5ed;
    background: #fff; font-size: 0.8rem; font-weight: 500;
    color: #5a5d72; cursor: pointer; font-family: inherit;
    white-space: nowrap; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: #818cf8; color: #4f46e5; background: #f8f8ff; }
  .filter-btn.active { background: #0a0a1e; border-color: #0a0a1e; color: #fff; box-shadow: 0 2px 12px rgba(10,10,30,0.15); }
  .filter-count {
    display: inline-block; background: rgba(0,0,0,0.08); border-radius: 100px;
    padding: 0 0.4rem; font-size: 0.65rem; margin-left: 0.25rem;
    min-width: 1.1rem; text-align: center; line-height: 1.4;
  }
  .filter-btn.active .filter-count { background: rgba(255,255,255,0.15); color: #fff; }

  /* ========== Demo Grid ========== */
  .demo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.25rem;
  }
  @media (max-width: 480px) { .demo-grid { grid-template-columns: 1fr; } }

  /* ========== Demo Card ========== */
  .demo-card {
    background: #fff; border-radius: 12px; overflow: hidden;
    border: 1px solid #eaebf2;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    display: flex; flex-direction: column;
    opacity: 0; transform: translateY(16px);
    animation: cardIn 0.4s ease forwards;
  }
  .demo-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 32px rgba(0,0,0,0.05);
    border-color: #d0d3de;
  }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

  .card-media {
    position: relative; width: 100%; aspect-ratio: 16 / 9;
    background: #f0f1f5; overflow: hidden;
  }
  .card-media img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: top 0;
    transition: transform 0.4s ease;
  }
  .demo-card:hover .card-media img { transform: scale(1.04); }
  .media-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #b0b4c7; font-size: 0.85rem;
    background: linear-gradient(145deg, #f0f1f5 0%, #e8eaf0 100%);
  }
  .media-placeholder .icon { font-size: 2.2rem; margin-bottom: 0.3rem; opacity: 0.35; }
  .media-placeholder .hint { font-size: 0.7rem; color: #b8bccf; }

  .card-cat-badge {
    position: absolute; top: 0.6rem; left: 0.6rem;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    color: #fff; padding: 0.15rem 0.6rem; border-radius: 100px;
    font-size: 0.65rem; font-weight: 500;
  }
  .card-status-badge {
    position: absolute; top: 0.6rem; right: 0.6rem;
    display: flex; align-items: center; gap: 0.3rem;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    color: #fff; padding: 0.15rem 0.55rem; border-radius: 100px;
    font-size: 0.65rem;
  }
  .card-status-badge .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: #34d399; box-shadow: 0 0 4px rgba(52,211,153,0.5);
  }

  .card-body { padding: 1rem 1.1rem 1.1rem; flex: 1; display: flex; flex-direction: column; }
  .card-body h3 { font-size: 0.95rem; font-weight: 600; color: #1a1a2e; margin-bottom: 0.3rem; line-height: 1.4; }
  .card-body p { font-size: 0.8rem; color: #6b6f84; line-height: 1.6; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.6rem 0 0.8rem; }
  .card-tags span { font-size: 0.65rem; padding: 0.1rem 0.5rem; border-radius: 100px; background: #f0f1f5; color: #5a5d72; font-weight: 450; }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 0.6rem; border-top: 1px solid #eaebf2; margin-top: auto;
  }
  .card-date { font-family: "Outfit", sans-serif; font-size: 0.7rem; color: #9ca0b4; }
  .card-btn {
    display: inline-flex; align-items: center; gap: 0.35rem;
    padding: 0.35rem 0.9rem; border-radius: 6px;
    background: #0a0a1e; color: #fff;
    font-family: "Outfit", sans-serif; font-size: 0.75rem; font-weight: 500;
    transition: background 0.15s; border: none; cursor: pointer;
  }
  .card-btn:hover { background: #1a1a3e; }
  .card-btn .arrow { display: inline-block; transition: transform 0.15s; }
  .demo-card:hover .card-btn .arrow { transform: translateX(3px); }

  /* ========== Empty State ========== */
  .empty-state { text-align: center; padding: 3rem 2rem; color: #8b8fa3; grid-column: 1 / -1; }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.8rem; opacity: 0.3; }
  .empty-state h3 { font-size: 1rem; color: #5a5d72; font-weight: 500; }

  /* ========== Footer ========== */
  .footer {
    border-top: 1px solid #eaebf2; margin-top: 2rem;
    padding: 2rem; text-align: center;
  }
  .footer-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; flex-wrap: wrap; }
  .footer-brand { display: flex; align-items: center; gap: 0.5rem; }
  .footer-brand img { height: 18px; width: auto; opacity: 0.25; }
  .footer-info { font-size: 0.72rem; color: #8b8fa3; line-height: 1.7; text-align: left; }
  .footer-qr { text-align: center; }
  .footer-qr img { width: 70px; height: 70px; border-radius: 6px; border: 1px solid #eaebf2; margin: 0 auto; }
  .footer-qr-label { font-size: 0.6rem; color: #b0b4c7; margin-top: 0.3rem; }
  .footer-copy { font-size: 0.7rem; color: #b0b4c7; width: 100%; text-align: center; margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid #eaebf2; }

  @media (max-width: 768px) {
    .footer-inner { flex-direction: column; align-items: center; text-align: center; }
    .footer-info { text-align: center; }
  }
</style>
</head>
<body>

<!-- ===== Navigation ===== -->
<nav class="top-nav">
  <div class="brand">
    <img src="assets/logo.png" alt="旌越科技">
    <span class="brand-divider"></span>
    <span class="brand-text">旌越科技</span>
  </div>
  <span class="badge">✦ Product Showcase</span>
</nav>

<!-- ===== Hero ===== -->
<header class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <div class="hero-title-group">
        <h1>产品能力展示</h1>
        <div class="hero-stats">
          <div class="hero-stat">
            <div class="hero-stat-num" id="totalDemos">0</div>
            <div class="hero-stat-label">解决方案</div>
          </div>
          <div class="hero-stat-divider"></div>
          <div class="hero-stat">
            <div class="hero-stat-num" id="totalCategories">0</div>
            <div class="hero-stat-label">行业场景</div>
          </div>
          <div class="hero-stat-divider"></div>
          <div class="hero-stat">
            <div class="hero-stat-num" id="onlineCount">0</div>
            <div class="hero-stat-label">可体验</div>
          </div>
        </div>
      </div>
    </div>
    <div class="hero-intro">
      <span class="tagline">科大讯飞集团旗下子公司</span>
      <span class="mission">专注文旅、教育产业 AI 赋能 · 用技术守护文化，推动人工智能向善</span>
      <span class="vision">以 AI 大模型为引擎，打造「AI + 行业」全景式解决方案</span>
    </div>
  </div>
</header>

<!-- ===== Content ===== -->
<div class="content">
  <div class="filter-bar" id="filterBar"></div>
  <div class="demo-grid" id="demoGrid"></div>
</div>

<!-- ===== Footer ===== -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand"><img src="assets/logo.png" alt="旌越科技"></div>
    <div class="footer-info">
      广州旌越科技有限公司<br>
      广州市海珠区阅江西路218号 广州国际媒体港西港10层
    </div>
    <div class="footer-qr">
      <img src="assets/qrcode.jpg" alt="公众号">
      <div class="footer-qr-label">扫码关注</div>
    </div>
    <div class="footer-copy" id="footerText"></div>
  </div>
</footer>

<script>
(function() {
  var DEMOS_JSON = 'demos.json';

  window.placeholderHTML = function(icon) {
    return '<div class="media-placeholder"><div class="icon">' + icon + '</div><span class="hint">截图待添加</span></div>';
  };

  function handleScreenshot(img) {
    img.addEventListener('load', function() {
      if (this.naturalHeight > this.naturalWidth * 1.2) {
        this.style.objectFit = 'contain';
        this.style.background = '#e8eaf0';
      }
    });
  }

  fetch(DEMOS_JSON + '?t=' + Date.now())
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) { render(data); })
    .catch(function(e) {
      document.getElementById('demoGrid').innerHTML =
        '<div class="empty-state"><div class="icon">📁</div><h3>无法加载数据</h3><p>' + e.message + '</p></div>';
    });

  function render(data) {
    var site = data.site, categories = data.categories, demos = data.demos;
    var activeDemos = demos.filter(function(d) { return d.status === 'online'; });

    document.getElementById('totalDemos').textContent = demos.length;
    document.getElementById('totalCategories').textContent = categories.length;
    document.getElementById('onlineCount').textContent = activeDemos.length;
    document.getElementById('footerText').textContent = (site.footer || '') + ' · ' + new Date().getFullYear();

    var catMap = {};
    categories.forEach(function(c) { catMap[c.id] = c; });

    var filterBar = document.getElementById('filterBar');
    var allBtn = document.createElement('button');
    allBtn.className = 'filter-btn active';
    allBtn.dataset.cat = 'all';
    allBtn.innerHTML = '全部 <span class="filter-count">' + demos.length + '</span>';
    filterBar.appendChild(allBtn);

    categories.forEach(function(cat) {
      var count = demos.filter(function(d) { return d.category === cat.id; }).length;
      if (count === 0) return;
      var btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.cat = cat.id;
      btn.innerHTML = cat.icon + ' ' + cat.name + ' <span class="filter-count">' + count + '</span>';
      filterBar.appendChild(btn);
    });

    var grid = document.getElementById('demoGrid');

    function renderCards(categoryId) {
      var filtered = categoryId === 'all' ? demos : demos.filter(function(d) { return d.category === categoryId; });
      grid.innerHTML = '';
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>暂无内容</h3></div>';
        return;
      }
      for (var i = 0; i < filtered.length; i++) {
        var demo = filtered[i];
        var cat = catMap[demo.category] || { name: demo.category, icon: '📦' };
        var card = document.createElement('div');
        card.className = 'demo-card';
        card.style.animationDelay = (i * 0.05) + 's';

        var hasShot = demo.screenshot && demo.screenshot.length > 0;
        var shotHtml = hasShot
          ? '<img src="' + demo.screenshot + '" alt="' + demo.title + '" loading="lazy" onerror="this.parentElement.innerHTML=placeholderHTML(\'' + cat.icon + '\')" onload="handleScreenshot(this)">'
          : '<div class="media-placeholder"><div class="icon">' + cat.icon + '</div><span class="hint">截图待添加</span></div>';

        var statusHtml = demo.status === 'online'
          ? '<span class="card-status-badge"><span class="dot"></span>可体验</span>' : '';

        var tagsHtml = '';
        if (demo.tags && demo.tags.length) {
          tagsHtml = '<div class="card-tags">';
          for (var t = 0; t < demo.tags.length; t++) tagsHtml += '<span>' + demo.tags[t] + '</span>';
          tagsHtml += '</div>';
        }

        card.innerHTML =
          '<a href="' + demo.url + '" target="_blank" rel="noopener" style="display:flex;flex-direction:column;height:100%;color:inherit;text-decoration:none">' +
          '<div class="card-media">' + shotHtml +
            '<span class="card-cat-badge">' + cat.icon + ' ' + cat.name + '</span>' + statusHtml +
          '</div>' +
          '<div class="card-body">' +
            '<h3>' + demo.title + '</h3>' +
            '<p>' + demo.description + '</p>' + tagsHtml +
            '<div class="card-footer">' +
              '<span class="card-date">' + (demo.created || '') + '</span>' +
              '<span class="card-btn">查看 <span class="arrow">→</span></span>' +
            '</div>' +
          '</div>' +
          '</a>';
        grid.appendChild(card);
      }
    }

    renderCards('all');

    filterBar.addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      var active = filterBar.querySelector('.filter-btn.active');
      if (active) active.classList.remove('active');
      btn.classList.add('active');
      renderCards(btn.dataset.cat);
    });
  }
})();
</script>
</body>
</html>
